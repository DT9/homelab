# =============================================================================
# WATCHDOG CONFIGURATION
# =============================================================================

# Hardware watchdog (use "ipmi" for server hardware, "none" for consumer)
pve_watchdog: "none"
# pve_watchdog: "ipmi"  # Uncomment for server hardware

